site_name: Multitask Delphos
site_description: Reinforcement Learning for Assisted Discrete Choice Model Specification
site_url: https://tud-cityai-lab.github.io/Multitask-Delphos/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy

nav:
  - Home: index.md

  - Getting Started:
      - Overview: getting_started/overview.md
      - Installation: getting_started/installation.md

  - Inference:
      - Overview: inference/main.md

  - Reinforcement Learning:
      - Overview: reinforcement_learning/main.md
      - Training: reinforcement_learning/training.md

  - Datasets:
      - Overview: datasets/main.md

  - Tutorials:
      - tutorials/main.md

repo_url: https://github.com/TUD-CityAI-Lab/Multitask-Delphos
repo_name: Multitask-Delphos

markdown_extensions:
  - attr_list
  - md_in_html
